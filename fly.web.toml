app = 'lucky-slots-web'
primary_region = 'iad'

[build]
  dockerfile = "apps/web/Dockerfile"

[env]
  PORT = "3000"
  NITRO_PORT = "3000"
  NUXT_PUBLIC_API_URL = "https://lucky-slots-api.fly.dev/graphql"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
